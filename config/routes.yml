# QCD Redis - Admin routes (Symfony).
#
# Every route maps to the QcdRedisController service and declares
# _legacy_controller so PrestaShop attaches the admin security token and the
# tab permission profile (class name AdminQcdRedis).

qcdredis_admin_configure:
    path: /qcdredis/configure
    methods: [GET, POST]
    defaults:
        _controller: 'QcdGone\QcdRedis\Controller\Admin\QcdRedisController::index'
        _legacy_controller: AdminQcdRedis
        _legacy_link: AdminQcdRedis

qcdredis_admin_test_connection:
    path: /qcdredis/test-connection
    methods: [POST]
    defaults:
        _controller: 'QcdGone\QcdRedis\Controller\Admin\QcdRedisController::testConnection'
        _legacy_controller: AdminQcdRedis
        _legacy_link: AdminQcdRedis:testConnection

